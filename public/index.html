<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commerce Storefront UI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="kicker">Commerce Storefront UI</p>
          <h1>商品、カート、会計の動き</h1>
        </div>
        <div class="status" id="status">読み込み中</div>
      </header>

      <section class="controls" aria-label="注文条件">
        <div class="segments" role="group" aria-label="在庫状態">
          <button class="segment is-active" type="button" data-scenario="normal">通常</button>
          <button class="segment" type="button" data-scenario="out-of-stock">在庫切れ</button>
        </div>
        <label class="quantity">
          <span>数量</span>
          <input id="quantity" type="number" min="1" max="9" value="2" />
        </label>
      </section>

      <section class="layout">
        <article class="product">
          <div class="product-image">
            <div class="notebook"><span></span></div>
          </div>
          <div class="product-body">
            <p class="eyebrow">商品レポ</p>
            <h2 id="product-name">Notebook</h2>
            <dl class="facts" id="product-facts"></dl>
          </div>
        </article>

        <article class="flow">
          <div class="panel-head">
            <div>
              <p class="eyebrow">注文の流れ</p>
              <h2 id="flow-title">確認中</h2>
            </div>
          </div>
          <div class="steps" id="steps"></div>
          <div class="summary" id="summary"></div>
        </article>

        <article class="impact">
          <div class="panel-head">
            <div>
              <p class="eyebrow">横断影響</p>
              <h2>直す場所の見え方</h2>
            </div>
          </div>
          <div class="impact-list" id="impact-list"></div>
          <div class="contracts" id="contracts"></div>
        </article>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
